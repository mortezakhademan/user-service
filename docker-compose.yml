version: "3.9"

services:
  app:
    build: .
    container_name: golang_app
    depends_on:
      - mongo
    command: ["./main", "-env", "/.env"]
    volumes:
      - ./.env:/.env:ro   # mount local config directory read-only
    ports:
      - "7020:7020"
      - "9020:9020"

  mongo:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: