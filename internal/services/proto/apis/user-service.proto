syntax = "proto3";

import "list.proto";
import "google/protobuf/empty.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "validate/validate.proto";
import "google/protobuf/descriptor.proto";

package github.com.mortezakhademan;

option go_package = "github.com/mortezakhademan/user-service-sample/services/proto/apis-gen/user;user";

// Service definition for CRUD operations
service UserService {
  rpc InsertUser(InsertUserRequest) returns (Id) {
    option (google.api.http) = {
      post: "/user";
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: ["User"];
      summary: "Insert user";
    };
  }

  rpc UpdateUser(UpdateUserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/user/{id}";
      body: "*";
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: ["User"];
      summary: "Update user";
    };
  }

  rpc GetUser(Id) returns (User) {
    option (google.api.http) = {
      get: "/user/{id}";
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: ["User"];
      summary: "Get user";
    };
  }

  rpc GetUserList(imports.list.PaginatedListRequest) returns (UserListResponse) {
    option (google.api.http) = {
      get: "/users";
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: ["User"];
      summary: "Get paginated user list";
    };
  }
  
  rpc DeleteUser(Id) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/user/{id}";
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: ["User"];
      summary: "Delete user";
    };
  }
}

message User {
  string id = 1;
  string name = 2;
  string phone = 3;
}

message Id {
  string id = 1 [(validate.rules).string.pattern = "^[0-9a-fA-F]{24}$"];
}

message InsertUserRequest {
  string name = 1 [(validate.rules).string = {min_len: 3}];
  string phone = 2 [(validate.rules).string = {pattern: "^09\\d{9}$",ignore_empty:true}];
}

message UpdateUserRequest {
  string id = 1 [(validate.rules).string.pattern = "^[0-9a-fA-F]{24}$"];
  string name = 2 [(validate.rules).string = {min_len: 3}];
  string phone = 3 [(validate.rules).string={pattern:"^09\\d{9}$",ignore_empty:true}];
}

message UserListItem {
  string id = 1;
  string name = 2;
  string phone = 3;
}

message UserListResponse{
  repeated UserListItem data = 1;
  imports.list.PaginatedListResponse response = 2;
}